<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给妈妈的信</title>

<!-- 手写字体 -->
<link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at top,#fff,#f3e7ea);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:"PingFang SC";
}

/* 粒子背景 */
canvas{
  position:absolute;
  top:0;
  left:0;
}

/* 信封 */
.envelope{
  width:340px;
  height:220px;
  background:#f5e9e6;
  position:relative;
  border-radius:12px;
  box-shadow:0 20px 60px rgba(0,0,0,0.12);
  cursor:pointer;
  overflow:hidden;
  z-index:2;
}

/* 信封盖 */
.flap{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:50%;
  background:#f0ddd8;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1.2s ease;
}

/* 打开 */
.envelope.open .flap{
  transform:rotateX(180deg);
}

/* 信纸 */
.letter{
  position:absolute;
  bottom:-100%;
  width:100%;
  height:100%;
  background:#fff;
  padding:30px 26px;
  transition:1.2s ease;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.envelope.open .letter{
  bottom:0;
}

/* 标题 */
.title{
  font-size:20px;
  color:#c06f83;
  text-align:center;
  margin-bottom:12px;
}

/* 手写内容 */
.text{
  font-family:"Zhi Mang Xing", cursive;
  font-size:20px;
  line-height:1.8;
  color:#5e4b50;
  white-space:pre-line;
}

/* 署名 */
.sign{
  margin-top:18px;
  text-align:right;
  font-size:13px;
  color:#b08a95;
}

/* 康乃馨漂浮 */
.flower{
  position:absolute;
  width:80px;
  height:80px;
  background:radial-gradient(circle at 30% 30%,#fff,#ffbfd2,#ff6f95);
  border-radius:50%;
  filter:blur(0.2px);
  animation:float 6s ease-in-out infinite;
  opacity:0.7;
}

.flower:nth-child(1){top:10%;left:15%;}
.flower:nth-child(2){top:60%;left:10%;animation-delay:2s;}
.flower:nth-child(3){top:30%;right:10%;animation-delay:4s;}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}

/* 提示 */
.tip{
  position:absolute;
  bottom:30px;
  font-size:12px;
  color:#c7a7af;
}
</style>
</head>

<body>

<!-- 粒子 -->
<canvas id="canvas"></canvas>

<!-- 漂浮康乃馨 -->
<div class="flower"></div>
<div class="flower"></div>
<div class="flower"></div>

<!-- 信封 -->
<div class="envelope" onclick="openLetter()">

  <div class="flap"></div>

  <div class="letter">
    <div class="title">母亲节快乐，妈妈李金金</div>

    <div class="text">
妈妈：

谢谢您一直在我身边，
不声不响，却一直都在。

我慢慢长大，
才明白您把多少温柔留给了我。

愿您以后，
多一点轻松，
少一点操心。

母亲节快乐。
    </div>

    <div class="sign">—— 刘舒畅（女儿）</div>
  </div>

</div>

<div class="tip">轻触信封拆开礼物</div>

<!-- 音乐 -->
<audio id="bgm" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_6b3b8f7b0c.mp3">
</audio>

<script>

/* ===== 信封打开 ===== */
function openLetter(){
  document.querySelector(".envelope").classList.add("open");
  let music=document.getElementById("bgm");
  music.volume=0;
  music.play();

  // 渐入音乐
  let v=0;
  let fade=setInterval(()=>{
    if(v<1){
      v+=0.05;
      music.volume=v;
    }else{
      clearInterval(fade);
    }
  },100);
}

/* ===== 粒子系统 ===== */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+1,
    d:Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,180,200,0.6)";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
    ctx.fill();
  });

  update();
}

function update(){
  particles.forEach(p=>{
    p.y+=p.d;
    if(p.y>canvas.height){
      p.y=0;
      p.x=Math.random()*canvas.width;
    }
  });
}

setInterval(draw,33);

</script>

</body>
</html>
