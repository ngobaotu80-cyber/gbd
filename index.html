<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>母亲节礼物</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #fffaf5, #f3eee8);
  font-family: "PingFang SC", sans-serif;
  overflow:hidden;
}

/* 卡片主体 */
.card{
  width:320px;
  height:520px;
  background:#fffdf9;
  border-radius:22px;
  box-shadow:0 20px 60px rgba(0,0,0,0.12);
  position:relative;
  overflow:hidden;
  transform:scale(0.9);
  animation:pop 1s ease forwards;
}

/* 轻微浮入 */
@keyframes pop{
  to{transform:scale(1);}
}

/* 封面 */
.cover{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(145deg,#fffaf3,#f6efe6);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  transition:1.2s ease;
  z-index:3;
}

.flower{
  width:120px;
  opacity:0;
  transform:translateY(20px);
  animation:flowerIn 2s ease 0.5s forwards;
}

@keyframes flowerIn{
  to{opacity:1;transform:translateY(0);}
}

.cover h2{
  margin-top:20px;
  font-weight:400;
  color:#c48a7a;
  letter-spacing:2px;
}

/* 打开效果 */
.card.open .cover{
  transform:translateY(-100%);
}

/* 信纸内容 */
.inner{
  position:absolute;
  width:100%;
  height:100%;
  padding:40px 28px;
  box-sizing:border-box;
  background:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  opacity:0;
  transition:1s ease 0.6s;
}

.card.open .inner{
  opacity:1;
}

.title{
  font-size:18px;
  color:#a87b6d;
  margin-bottom:20px;
}

.text{
  font-size:14px;
  line-height:1.8;
  color:#555;
  white-space:pre-line;
}

.signature{
  margin-top:30px;
  text-align:right;
  color:#888;
}

/* 点击提示 */
.tip{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:12px;
  color:#b9a79f;
}
</style>
</head>

<body>

<div class="card" onclick="openCard()">

  <!-- 封面 -->
  <div class="cover">
    <img class="flower" src="https://images.unsplash.com/photo-1524594152303-9fd13543fe6e?auto=format&fit=crop&w=400&q=80">
    <h2>母亲节快乐</h2>
  </div>

  <!-- 内容 -->
  <div class="inner">
    <div class="title">给妈妈的一封信</div>

    <div class="text">
妈妈：

见字如面。

平时不太说出口的话，都写在这里了。
谢谢你一直以来的照顾、包容和爱。

我慢慢长大了，但你依然是我最安心的地方。

希望你每天都轻松一点、开心一点。
也希望我能更好一点，让你少操心一点。

母亲节快乐。

爱你的女儿
刘舒畅
    </div>

    <div class="signature">—— 刘舒畅</div>
  </div>

  <div class="tip">点击卡片打开礼物</div>
</div>

<!-- 音乐（可替换） -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b3b1c0b7.mp3?filename=soft-piano-ambient-110397.mp3" type="audio/mpeg">
</audio>

<script>
function openCard(){
  document.querySelector('.card').classList.add('open');
  document.getElementById('music').play();
}
</script>

</body>
</html>
